controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_position_example_controller:
      type: franka_example_controllers/JointPositionExampleController

    joint_velocity_example_controller:
      type: franka_example_controllers/JointVelocityExampleController

    joint_impedance_example_controller:
      type: franka_example_controllers/JointImpedanceExampleController

    joint_impedance_with_ik_example_controller:
      type: franka_example_controllers/JointImpedanceWithIKExampleController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_position_example_controller:
  ros__parameters:
    gazebo: true

joint_velocity_example_controller:
  ros__parameters:
    gazebo: true
  
joint_impedance_example_controller:
  ros__parameters:
    k_gains:
      - 24.0
      - 24.0
      - 24.0
      - 24.0
      - 10.0
      - 6.0
      - 2.0
    d_gains:
      - 2.0
      - 2.0
      - 2.0
      - 1.0
      - 1.0
      - 1.0
      - 0.5

joint_impedance_with_ik_example_controller:
  ros__parameters:
    robot_type: fr3
    load_gripper: true
    gazebo: true
    k_gains:
      - 200.0
      - 200.0
      - 200.0
      - 200.0
      - 100.0
      - 60.0
      - 20.0
    d_gains:
      - 30.0
      - 30.0
      - 30.0
      - 30.0
      - 10.0
      - 7.0
      - 4.0

gz_ros2_control:
  ros__parameters:
    position_proportional_gain: 5.0  # default 0.1 is too low; fingers drift open from arm dynamics

gripper_controller:
  ros__parameters:
    joints:
      - fr3_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    goal_time: 5.0